<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehir Koyuncu | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- GENEL AYARLAR --- */
        :root {
            --bg-color: #0d0d0d;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --accent: #00ff41; /* Neon Yeşil */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        a { text-decoration: none; transition: 0.3s; }

        /* --- KART TASARIMI --- */
        .profile-card {
            text-align: center;
            padding: 40px 30px;
            max-width: 450px; /* Biraz daha dar ve şık */
            width: 90%;
            border: 1px solid #222;
            border-radius: 20px;
            background: linear-gradient(180deg, #161616 0%, #0d0d0d 100%);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            /* Mobilde taşmayı önlemek için */
            max-height: 95vh;
            overflow-y: auto; 
        }

        /* Profil Resmi */
        .profile-img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            margin-bottom: 15px;
            background-color: #333;
        }

        /* İsim ve Unvan */
        h1 {
            font-size: 2rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .title {
            color: var(--accent);
            font-size: 1rem;
            margin-top: 5px;
            font-weight: 500;
        }
        .location {
            color: var(--text-sub);
            font-size: 0.85rem;
            margin-top: 5px;
            margin-bottom: 25px;
        }

        /* Butonlar */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        .social-btn {
            background-color: #222;
            color: #fff;
            padding: 12px 0;
            width: 100%;
            border-radius: 50px;
            border: 1px solid #333;
            font-size: 0.95rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .social-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: scale(1.02);
            background-color: #1a1a1a;
        }

        /* CV Butonları (Ayırt edilmesi için farklı stil) */
        .cv-btn {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        .cv-btn:hover {
            background-color: var(--accent);
            color: #000;
        }

        /* Ayırıcı Çizgi */
        .divider {
            height: 1px;
            background-color: #333;
            width: 100%;
            margin: 10px 0;
        }

        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        
        <img src="profile.jpg" alt="Nehir Koyuncu" class="profile-img">

        <h1>NEHIR KOYUNCU</h1>
        <div class="title">Data & ML-Oriented Software Engineer</div>
        <div class="location"><i class="fas fa-map-marker-alt"></i> Turin, Piedmont, Italy</div>

        <div class="btn-container">
            
            <a href="mailto:nehirkoyuncu1@gmail.com" class="social-btn">
                <i class="fas fa-envelope"></i> nehirkoyuncu1@gmail.com
            </a>

            <a href="https://www.linkedin.com/in/nehir-koyuncu-6112a129b" target="_blank" class="social-btn">
                <i class="fab fa-linkedin"></i> LinkedIn Profilim
            </a>

            <a href="https://github.com/nehirkoyuncu" target="_blank" class="social-btn">
                <i class="fab fa-github"></i> GitHub Projelerim
            </a>

            <div class="divider"></div>

            <a href="cv-en.pdf" class="social-btn cv-btn" download>
                <i class="fas fa-file-download"></i> Download CV (English)
            </a>
            
            <a href="cv-it.pdf" class="social-btn cv-btn" download>
                <i class="fas fa-file-download"></i> Scarica CV (Italiano)
            </a>

        </div>

        <footer>
            &copy; 2026 Nehir Koyuncu.
        </footer>

    </div>

</body>
</html>
