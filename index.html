<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehir Koyuncu | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- GENEL AYARLAR --- */
        :root {
            --bg-color: #0d0d0d;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --accent: #00ff41; /* Neon Yeşil */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        
        /* --- KART TASARIMI --- */
        .profile-card {
            text-align: center;
            padding: 50px 30px;
            max-width: 400px; /* Kartı biraz daha daralttık, daha zarif dursun diye */
            width: 100%;
            border: 1px solid #222;
            border-radius: 20px;
            background: linear-gradient(180deg, #161616 0%, #0d0d0d 100%);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        /* Profil Resmi */
        .profile-img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            margin-bottom: 20px;
            background-color: #333;
        }

        /* İsim ve Unvan */
        h1 { font-size: 1.8rem; margin: 0; font-weight: 700; letter-spacing: 0.5px; }
        .title { color: var(--accent); font-size: 0.95rem; margin-top: 8px; font-weight: 500; }
        .location { color: var(--text-sub); font-size: 0.85rem; margin-top: 5px; margin-bottom: 35px; }

        /* --- SOSYAL MEDYA İKONLARI --- */
        .social-icons-row {
            display: flex;
            justify-content: center;
            gap: 25px; /* İkonlar arası boşluk */
            margin-bottom: 35px;
        }
        .icon-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: #222;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .icon-btn:hover {
            background-color: var(--accent);
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        /* CV Butonları */
        .cv-btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            margin-bottom: 12px;
            border-radius: 50px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            transition: 0.3s;
        }
        .cv-btn:hover {
            background-color: var(--accent);
            color: #000;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        footer { font-size: 0.75rem; color: #444; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="profile-card">
        
        <img src="profile.jpg" alt="Nehir Koyuncu" class="profile-img">

        <h1>NEHIR KOYUNCU</h1>
        <div class="title">Data & ML-Oriented Software Engineer</div>
        <div class="location"><i class="fas fa-map-marker-alt"></i> Turin, Piedmont, Italy</div>

        <div class="social-icons-row">
            <a href="mailto:nehirkoyuncu1@gmail.com" class="icon-btn" title="Email Me">
                <i class="fas fa-envelope"></i>
            </a>
            <a href="https://www.linkedin.com/in/nehir-koyuncu-6112a129b" target="_blank" class="icon-btn" title="LinkedIn">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="https://github.com/nehirkoyuncu" target="_blank" class="icon-btn" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
        </div>

        <a href="cv-en.pdf" class="cv-btn" download>
            <i class="fas fa-file-download"></i> Download CV (English)
        </a>
        
        <a href="cv-it.pdf" class="cv-btn" download>
            <i class="fas fa-file-download"></i> Scarica CV (Italiano)
        </a>

        <footer>
            &copy; 2026 Nehir Koyuncu.
        </footer>

    </div>

</body>
</html>
