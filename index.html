<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehir Koyuncu | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- GENEL AYARLAR --- */
        :root {
            --bg-color: #0d0d0d;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --accent: #00ff41; /* Neon Yeşil */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        
        /* --- KART TASARIMI --- */
        .profile-card {
            text-align: center;
            padding: 40px 30px;
            max-width: 420px; 
            width: 100%;
            border: 1px solid #222;
            border-radius: 24px;
            background: linear-gradient(180deg, #161616 0%, #0d0d0d 100%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Profil Resmi - 180px Boyutu Korundu */
        .profile-img {
            width: 180px; 
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--accent);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
            margin-bottom: 25px;
            background-color: transparent;
            transition: transform 0.3s ease;
        }
        
        .profile-img:hover {
            transform: scale(1.05);
        }

        /* İsim ve Unvan */
        h1 { font-size: 2rem; margin: 0; font-weight: 700; letter-spacing: 1px; }
        .title { color: var(--accent); font-size: 1rem; margin-top: 10px; font-weight: 500; }
        .location { color: var(--text-sub); font-size: 0.9rem; margin-top: 10px; margin-bottom: 35px; }

        /* --- SOSYAL MEDYA İKONLARI --- */
        .social-icons-row {
            display: flex;
            justify-content: center;
            gap: 20px; 
            margin-bottom: 35px;
        }
        .icon-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            border: 1px solid #333;
            transition: 0.3s;
            text-decoration: none;
        }
        .icon-btn:hover {
            background-color: var(--accent);
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 65, 0.3);
        }

        /* CV Butonları */
        .cv-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 0;
            margin-bottom: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            transition: 0.3s;
            text-decoration: none;
        }
        .cv-btn:hover {
            background-color: var(--accent);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        footer { font-size: 0.8rem; color: #666; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="profile-card">
        
        <img src="profile.png" alt="Nehir Koyuncu" class="profile-img">

        <h1>NEHIR KOYUNCU</h1>
        <div class="title">Data & ML-Oriented Software Engineer</div>
        <div class="location"><i class="fas fa-map-marker-alt"></i> Turin, Piedmont, Italy</div>

        <div class="social-icons-row">
            <a href="mailto:nehirkoyuncu1@gmail.com" class="icon-btn" title="Email Me">
                <i class="fas fa-envelope"></i>
            </a>
            <a href="https://www.linkedin.com/in/nehir-koyuncu-6112a129b" target="_blank" class="icon-btn" title="LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
            <a href="https://github.com/nehirkoyuncu" target="_blank" class="icon-btn" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
        </div>

        <a href="mailto:nehirkoyuncu1@gmail.com?subject=CV Request - Nehir Koyuncu" class="cv-btn">
            <i class="fas fa-paper-plane"></i> Request CV (English)
        </a>
        
        <a href="mailto:nehirkoyuncu1@gmail.com?subject=Richiesta CV - Nehir Koyuncu" class="cv-btn">
            <i class="fas fa-paper-plane"></i> Richiedi CV (Italiano)
        </a>

        <footer>
            &copy; 2026 Nehir Koyuncu.
        </footer>

    </div>

</body>
</html>
